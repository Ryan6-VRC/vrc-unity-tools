# Float -> bool binary codec (encoder) — worked example for the animator write substrate.
#
# Encodes a float OscFloat in [0,1) into 3 bool bits by the classic subtract-walk (docs/gimmicks.md
# "Float->bool binary codec"): copy the input into a working residue, then for each bit b (weight
# 2^-(b+1) = 0.5, 0.25, 0.125) test residue > weight; if so set the bit and subtract the weight.
# Truncating (not rounding) — OscFloat=0.7 -> 0.101b = 0.625 -> bits [1,0,1]. n bits cost ~n frames
# (one transition per frame); the compiler's frame-latency advisory reports the walk length.
#
# The machine loops Start->…->Start so it re-encodes every cycle, tracking OscFloat live. Raw input
# (OscFloat) and encoded outputs (bit0..2) are distinct params. Compiles; AnimatorLint PASS; rung-3 verified.

schema: 1
controller: Codec_Fx
basis: avatar-root
role: fx

defaults:
  writeDefaults: on
  transition: { duration: 0, exitTime: none, interruption: none }

parameters:
  OscFloat: { type: float, default: 0.0 }   # the input to encode (0..1), driven externally / by OSC
  Work:     { type: float, default: 0.0 }   # working residue (driver-written; Copy of input, then Adds)
  bit0: bool                                  # MSB (0.5 place)
  bit1: bool                                  # 0.25 place
  bit2: bool                                  # LSB (0.125 place)

layers:
  - name: Codec
    # Each walk state carries a tiny inert `tick` clip so normalizedTime advances and the unconditional
    # "proceed"/"else" hops can fire on `exitTime: 1.0` (clip end, ~1 frame). A motionless state has no
    # clock, so its exit-time transitions never fire — the carrier is what makes the walk step. The
    # conditional Accept branch is listed first (fires immediately when Work exceeds the weight);
    # otherwise the state runs out its tick and the Reject hop fires. ~1 frame per state, ~8 per encode.
    states:
      Start:
        motion: { clip: tick }
        behaviours:
          - driver: { copy: { Work: OscFloat } }   # residue := input, fresh each cycle
        transitions:
          - { to: Test0, when: [], exitTime: 1.0 }
      Test0:
        motion: { clip: tick }
        transitions:
          - { to: Accept0, when: [ Work greater 0.5 ] }   # priority: accept if residue exceeds the weight
          - { to: Reject0, when: [], exitTime: 1.0 }         # else fall through when the tick ends
      Accept0:
        motion: { clip: tick }
        behaviours:
          - driver: { set: { bit0: 1 }, add: { Work: -0.5 } }
        transitions: [ { to: Test1, when: [], exitTime: 1.0 } ]
      Reject0:
        motion: { clip: tick }
        behaviours:
          - driver: { set: { bit0: 0 } }
        transitions: [ { to: Test1, when: [], exitTime: 1.0 } ]
      Test1:
        motion: { clip: tick }
        transitions:
          - { to: Accept1, when: [ Work greater 0.25 ] }
          - { to: Reject1, when: [], exitTime: 1.0 }
      Accept1:
        motion: { clip: tick }
        behaviours:
          - driver: { set: { bit1: 1 }, add: { Work: -0.25 } }
        transitions: [ { to: Test2, when: [], exitTime: 1.0 } ]
      Reject1:
        motion: { clip: tick }
        behaviours:
          - driver: { set: { bit1: 0 } }
        transitions: [ { to: Test2, when: [], exitTime: 1.0 } ]
      Test2:
        motion: { clip: tick }
        transitions:
          - { to: Accept2, when: [ Work greater 0.125 ] }
          - { to: Reject2, when: [], exitTime: 1.0 }
      Accept2:
        motion: { clip: tick }
        behaviours:
          - driver: { set: { bit2: 1 } }
        transitions: [ { to: Start, when: [], exitTime: 1.0 } ]   # loop: re-encode next cycle
      Reject2:
        motion: { clip: tick }
        behaviours:
          - driver: { set: { bit2: 0 } }
        transitions: [ { to: Start, when: [], exitTime: 1.0 } ]
    default: Start

clips:
  tick: { seconds: 0.02 }   # ~1 frame at 60fps; inert carrier so exitTime hops can fire
